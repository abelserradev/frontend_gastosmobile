server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # APK Android — servida desde public/ vía ng build (Content-Type correcto para instalación)
    location = /gastos-mobile.apk {
        add_header Content-Type application/vnd.android.package-archive;
        add_header Content-Disposition 'attachment; filename="gastos-mobile.apk"';
        try_files $uri =404;
    }

    # SPA: rutas del cliente sin 404 en refresh
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
