<div
  class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center p-4"
>
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-8 space-y-6">
      <h1 class="text-xl font-bold text-gray-900">Nueva contraseña</h1>

      @if (!tokenPresent()) {
        <p class="text-gray-600 text-sm">
          Este enlace no incluye un token válido. Pedí uno nuevo desde la pantalla de inicio de
          sesión.
        </p>
        <button
          type="button"
          class="w-full py-3 rounded-lg font-medium bg-indigo-600 text-white hover:bg-indigo-700"
          (click)="goLogin()"
        >
          Volver al inicio de sesión
        </button>
      } @else {
        <p class="text-gray-600 text-sm">
          Elegí una contraseña nueva (distinta a la anterior). Mínimo 8 caracteres.
        </p>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" for="reset-new-password"
              >Nueva contraseña</label
            >
            <input
              id="reset-new-password"
              type="password"
              name="newPassword"
              [(ngModel)]="newPassword"
              autocomplete="new-password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
              required
              minlength="8"
            />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2" for="reset-confirm-password"
              >Confirmar contraseña</label
            >
            <input
              id="reset-confirm-password"
              type="password"
              name="confirmPassword"
              [(ngModel)]="confirmPassword"
              autocomplete="new-password"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
              required
              minlength="8"
            />
          </div>
        </div>
        <button
          type="button"
          [disabled]="submitting()"
          class="w-full py-3 rounded-lg font-medium bg-gradient-to-r from-indigo-600 to-purple-600 text-white hover:from-indigo-700 hover:to-purple-700 disabled:opacity-60"
          (click)="submit()"
        >
          {{ submitting() ? 'Guardando…' : 'Guardar y volver al login' }}
        </button>
      }
    </div>
  </div>
</div>
