<div
  class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center p-4"
>
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-8 space-y-6">
      <h1 class="text-xl font-bold text-gray-900">Definí tu contraseña</h1>
      <p class="text-gray-600 text-sm">
        Entraste con Google. Creá una contraseña para esta app y así podrás iniciar sesión también con correo y clave en
        otros dispositivos (o usar “Recuperar contraseña” si la olvidaste).
      </p>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2" for="setup-password-field"
            >Contraseña</label
          >
          <input
            id="setup-password-field"
            type="password"
            name="setupPassword"
            [(ngModel)]="password"
            autocomplete="new-password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            required
            minlength="8"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2" for="setup-confirm-field"
            >Confirmar contraseña</label
          >
          <input
            id="setup-confirm-field"
            type="password"
            name="setupConfirmPassword"
            [(ngModel)]="confirmPassword"
            autocomplete="new-password"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
            required
            minlength="8"
          />
        </div>
      </div>
      <button
        type="button"
        [disabled]="submitting()"
        class="w-full py-3 rounded-lg font-medium bg-gradient-to-r from-indigo-600 to-purple-600 text-white hover:from-indigo-700 hover:to-purple-700 disabled:opacity-60"
        (click)="submit()"
      >
        {{ submitting() ? 'Guardando…' : 'Continuar' }}
      </button>
    </div>
  </div>
</div>
